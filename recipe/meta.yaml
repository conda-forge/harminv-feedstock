{% set version = "1.4.3" %}

package:
  name: harminv
  version: {{ version }}

source:
  url: https://github.com/NanoComp/harminv/releases/download/v{{ version }}/harminv-{{ version }}.tar.gz
  sha256: 883b29a126bd5ba00ccf804b986e568980d39a53ec8f86ae05a43ca6c107cc38

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - gnuconfig  # [unix]
    - {{ compiler('fortran') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
  host:
    - libblas
    - libcblas
    - liblapack
  run:

test:
  commands:
    - test -f ${PREFIX}/lib/libharminv${SHLIB_EXT}  # [unix]

about:
  home: https://github.com/NanoComp/harminv
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: Harmonic inversion algorithm of Mandelshtam - decompose signal into sum of decaying sinusoids
  #doc_url: https://harminv.readthedocs.io
  dev_url: https://github.com/NanoComp/harminv

extra:
  recipe-maintainers:
    - oskooi
